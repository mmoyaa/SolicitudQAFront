name: 🧪 E2E Tests con Playwright

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout Frontend
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install -g @angular/cli

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start development server
        run: |
          npm start > /tmp/ng-serve.log 2>&1 &
          sleep 20
          if ! curl -f http://localhost:4200/; then
            echo "Frontend no está disponible"
            cat /tmp/ng-serve.log
            exit 1
          fi

      - name: Run E2E tests
        run: npm run e2e
        continue-on-error: true

      - name: Generate Report
        if: always()
        run: node scripts/generate-report.js || echo "Report generation skipped"

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.node-version }}
          path: playwright-report/
          retention-days: 30

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.node-version }}
          path: test-results/
          retention-days: 30
