name: 🧪 E2E Tests con Playwright

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Instalar Node 18 (compatible)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. Instalar dependencias
      - name: Install NPM dependencies
        run: npm ci

      # 4. Instalar Playwright y navegadores
      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      # 5. ESPERAR MÁS TIEMPO al inicio del servidor
      - name: Start Angular server
        run: |
          timeout 120 npm start > /tmp/server.log 2>&1 &
          echo "Esperando servidor Angular..."
          for i in {1..60}; do
            if curl -s http://localhost:4200 > /dev/null; then
              echo "✅ Servidor listo en intento $i"
              break
            fi
            echo "Intento $i/60..."
            sleep 2
          done

      # 6. Verificar que el servidor está corriendo
      - name: Verify server
        run: |
          curl -v http://localhost:4200 || (cat /tmp/server.log && exit 1)

      # 7. Ejecutar tests (solo en Chromium para ser más rápido)
      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        continue-on-error: true

      # 8. Cargar reportes
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      # 9. Mostrar logs si falló
      - name: Show server logs if failed
        if: failure()
        run: |
          echo "=== SERVIDOR LOG ==="
          cat /tmp/server.log || echo "No hay logs"
