name: 🧪 E2E Tests con Playwright

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      # ⭐ NUEVA ESTRATEGIA: Hacer build en lugar de servir
      - name: Build Angular app
        run: npm run build

      # ⭐ NUEVA: Usar un servidor simple
      - name: Start simple HTTP server
        run: |
          cd dist/solicitudQA/browser
          npx http-server -p 4200 -c-1 > /tmp/server.log 2>&1 &
          echo "Esperando servidor..."
          for i in {1..30}; do
            if curl -s http://localhost:4200 > /dev/null; then
              echo "✅ Servidor listo"
              break
            fi
            sleep 1
          done
          sleep 2

      - name: Verify server
        run: curl -v http://localhost:4200

      - name: Run tests
        run: npx playwright test --project=chromium
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
